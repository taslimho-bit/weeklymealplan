<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每周健康食谱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f7f3ee;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #e8703a, #c45020);
      color: white;
      padding: 22px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: 1px; }
    header p { font-size: 0.88rem; opacity: 0.85; margin-top: 5px; }

    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: white;
      border-bottom: 1px solid #ede8e2;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .week-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #c45020;
    }
    .nav-buttons { display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 600;
      transition: all 0.18s;
    }
    .btn-primary { background: #e8703a; color: white; }
    .btn-primary:hover { background: #c45020; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(232,112,58,0.3); }
    .btn-secondary { background: #f0ebe3; color: #666; }
    .btn-secondary:hover { background: #e4dcd3; }

    .main { padding: 20px 24px; overflow-x: auto; }

    .week-grid {
      display: grid;
      grid-template-columns: 56px repeat(7, 1fr);
      gap: 7px;
      min-width: 760px;
    }

    .grid-corner { /* empty top-left */ }

    .grid-header {
      text-align: center;
      padding: 9px 4px;
      font-weight: 700;
      font-size: 0.82rem;
      color: #666;
      background: white;
      border-radius: 8px;
    }
    .grid-header.today {
      background: #fff3ed;
      color: #e8703a;
      border: 1.5px solid #f8c8a8;
    }

    .meal-type-label {
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 0.78rem;
      font-weight: 700;
      color: #888;
      background: white;
      border-radius: 8px;
      padding: 6px 0;
    }

    .meal-card {
      background: white;
      border-radius: 10px;
      padding: 9px 10px;
      cursor: pointer;
      transition: all 0.18s;
      border: 2px solid transparent;
      border-left-width: 4px;
    }
    .meal-card:hover {
      border-color: #e8703a;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(232,112,58,0.15);
    }
    .meal-card.breakfast { border-left-color: #f9c74f; }
    .meal-card.lunch     { border-left-color: #76c442; }
    .meal-card.dinner    { border-left-color: #4a90d9; }

    .meal-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .meal-cal {
      font-size: 0.72rem;
      color: #e8703a;
      font-weight: 600;
    }

    .total-label {
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      font-size: 0.72rem;
      font-weight: 700;
      color: #aaa;
    }
    .day-total {
      text-align: center;
      padding: 8px 4px;
      font-size: 0.82rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #e8703a, #c45020);
      border-radius: 9px;
      line-height: 1.3;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 18px;
      padding: 10px 24px 2px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #777;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.48);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 18px;
      max-width: 560px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid #f0ebe2;
      position: sticky;
      top: 0;
      background: white;
      z-index: 1;
      border-radius: 18px 18px 0 0;
    }
    .modal-header h2 { font-size: 1.2rem; color: #222; padding-right: 30px; }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .tag-cal  { background: #fff3ed; color: #e8703a; }
    .tag-time { background: #f0fae8; color: #5aa328; }
    .tag-diff { background: #eef3ff; color: #4a6cf7; }

    .modal-close {
      position: absolute;
      top: 16px; right: 18px;
      width: 30px; height: 30px;
      border: none;
      background: #f0ebe3;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      color: #777;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: #e0d6cc; }

    .modal-body { padding: 18px 24px 24px; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 18px 0 8px;
    }
    .section-title:first-child { margin-top: 0; }

    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .ing-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: #f8f4ee;
      border-radius: 8px;
      font-size: 0.83rem;
      color: #444;
    }
    .ing-item::before {
      content: '';
      width: 6px; height: 6px;
      background: #e8703a;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .steps-list { list-style: none; }
    .steps-list li {
      display: flex;
      gap: 12px;
      margin-bottom: 11px;
      font-size: 0.87rem;
      line-height: 1.65;
      color: #444;
    }
    .step-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: #e8703a;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 800;
      margin-top: 3px;
    }

    /* Shopping list categories */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-bottom: 4px;
    }
    .shop-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: #f8f4ee;
      border-radius: 8px;
      font-size: 0.83rem;
      color: #444;
    }
    .shop-item::before {
      content: '☐';
      font-size: 0.9rem;
      color: #ccc;
    }

    @media (max-width: 600px) {
      header { padding: 16px 16px; }
      .week-nav { padding: 10px 16px; }
      .main { padding: 12px 10px; }
      .legend { padding: 8px 14px 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>🍚 每周健康食谱</h1>
  <p>中式家常菜 · 每日热量 ≤ 1500 千卡 · 食材超市轻松购</p>
</header>

<div class="week-nav">
  <div class="week-title" id="weekTitle">第 1 周</div>
  <div class="nav-buttons">
    <button class="btn btn-secondary" onclick="prevWeek()">◀ 上一周</button>
    <button class="btn btn-secondary" onclick="nextWeek()">下一周 ▶</button>
    <button class="btn btn-primary" onclick="showShoppingList()">📝 购物清单</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f9c74f"></div>早餐</div>
  <div class="legend-item"><div class="legend-dot" style="background:#76c442"></div>午餐</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a90d9"></div>晚餐</div>
  <div class="legend-item" style="margin-left:auto;color:#bbb;font-size:0.76rem;">点击任意菜品查看食谱详情</div>
</div>

<div class="main">
  <div class="week-grid" id="weekGrid"></div>
</div>

<!-- Recipe Modal -->
<div class="modal-overlay" id="recipeModal" onclick="closeModal('recipeModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal('recipeModal')">✕</button>
      <h2 id="modalTitle"></h2>
      <div class="modal-meta" id="modalMeta"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Shopping List Modal -->
<div class="modal-overlay" id="shoppingModal" onclick="closeModal('shoppingModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal('shoppingModal')">✕</button>
      <h2>📝 本周购物清单</h2>
      <div class="modal-meta"><span class="tag tag-time">点击方框可手动勾选</span></div>
    </div>
    <div class="modal-body" id="shoppingBody"></div>
  </div>
</div>

<script>
// ─── 菜品数据库 ────────────────────────────────────────────────

const dayNames = ['周一','周二','周三','周四','周五','周六','周日'];
const typeClass = { b:'breakfast', l:'lunch', d:'dinner' };
const typeLabel = { b:'早餐', l:'午餐', d:'晚餐' };

let currentWeek = 0;

// ─── 渲染 ──────────────────────────────────────────────────────

function renderGrid() {
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  document.getElementById('weekTitle').textContent = `第 ${currentWeek + 1} 周（共4周轮换）`;

  const week = weekPlans[currentWeek];
  const todayDow = new Date().getDay(); // 0=Sun
  const dowMap = [1,2,3,4,5,6,0];      // Mon=0…Sun=6

  // 左上角空格
  grid.appendChild(div());

  // 星期标题行
  dayNames.forEach((name, i) => {
    const isToday = todayDow === dowMap[i];
    const el = div(`grid-header${isToday ? ' today' : ''}`);
    el.textContent = name + (isToday ? '\n今天' : '');
    el.style.whiteSpace = 'pre-line';
    grid.appendChild(el);
  });

  // 早中晚三行
  ['b','l','d'].forEach(type => {
    const label = div('meal-type-label');
    label.textContent = typeLabel[type];
    grid.appendChild(label);

    week.forEach((day, di) => {
      const meal = mealDB[day[type]];
      const card = div(`meal-card ${typeClass[type]}`);
      card.innerHTML = `<div class="meal-name">${meal.name}</div><div class="meal-cal">${meal.cal} kcal</div>`;
      card.onclick = () => openRecipe(day[type]);
      grid.appendChild(card);
    });
  });

  // 合计行
  const totalLabel = div('total-label');
  totalLabel.textContent = '合计';
  grid.appendChild(totalLabel);

  week.forEach(day => {
    const total = mealDB[day.b].cal + mealDB[day.l].cal + mealDB[day.d].cal;
    const el = div('day-total');
    el.innerHTML = `${total}<br><span style="font-size:0.68rem;opacity:0.82">千卡</span>`;
    grid.appendChild(el);
  });
}

function div(cls='') {
  const el = document.createElement('div');
  if (cls) el.className = cls;
  return el;
}

// ─── 食谱弹窗 ─────────────────────────────────────────────────

function openRecipe(id) {
  const m = mealDB[id];
  document.getElementById('modalTitle').textContent = m.name;
  document.getElementById('modalMeta').innerHTML = `
    <span class="tag tag-cal">🔥 ${m.cal} 千卡</span>
    <span class="tag tag-time">⏱ ${m.time}</span>
    <span class="tag tag-diff">难度：${m.diff}</span>
  `;
  const ings = m.ingredients.map(i => `<div class="ing-item">${i}</div>`).join('');
  const steps = m.steps.map((s,i) =>
    `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`
  ).join('');
  document.getElementById('modalBody').innerHTML = `
    <div class="section-title">食材清单</div>
    <div class="ingredients-grid">${ings}</div>
    <div class="section-title">烹饪步骤</div>
    <ol class="steps-list">${steps}</ol>
  `;
  document.getElementById('recipeModal').classList.add('active');
}

// ─── 购物清单 ─────────────────────────────────────────────────

function showShoppingList() {
  const week = weekPlans[currentWeek];
  const seen = new Set();
  const items = [];
  week.forEach(day => {
    ['b','l','d'].forEach(t => {
      mealDB[day[t]].ingredients.forEach(ing => {
        const key = ing.split(/[\s（(]/)[0];
        if (!seen.has(key)) { seen.add(key); items.push(ing); }
      });
    });
  });

  const cats = {
    '🌾 主食 & 杂粮': ['米','小米','燕麦','全麦','红薯','地瓜','紫薯','玉米','馒头','杂粮'],
    '🥩 肉类 & 海鲜': ['猪','鸡','排骨','虾','鱼','草鱼','鲈鱼'],
    '🥚 蛋类 & 豆制品': ['鸡蛋','皮蛋','咸鸡蛋','咸蛋','豆腐','豆浆','豆腐脑'],
    '🥦 蔬菜': ['番茄','菠菜','白菜','菜心','青椒','西兰花','冬瓜','黄瓜','土豆','南瓜','西葫芦','豆芽','时蔬','莴笋','包菜'],
    '🌿 干货': ['紫菜','黄花菜','木耳','红豆'],
    '🧂 调料': ['植物油','盐','生抽','老抽','醋','香油','淀粉','糖','料酒','姜','葱','蒜','八角','桂皮','胡椒'],
  };

  const result = {};
  const other = [];
  items.forEach(ing => {
    let placed = false;
    for (const [cat, kws] of Object.entries(cats)) {
      if (kws.some(k => ing.includes(k))) {
        (result[cat] = result[cat]||[]).push(ing);
        placed = true; break;
      }
    }
    if (!placed) other.push(ing);
  });
  if (other.length) result['🔹 其他'] = other;

  let html = '';
  for (const [cat, list] of Object.entries(result)) {
    if (!list.length) continue;
    html += `<div class="section-title">${cat}</div><div class="cat-grid">`;
    list.forEach(i => { html += `<div class="shop-item">${i}</div>`; });
    html += `</div>`;
  }
  document.getElementById('shoppingBody').innerHTML = html;
  document.getElementById('shoppingModal').classList.add('active');
}
